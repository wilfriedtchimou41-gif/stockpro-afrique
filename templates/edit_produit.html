{% extends 'base.html' %} <!-- Si tu as un layout de base, sinon enlève cette ligne -->

{% block content %}
<div class="container mt-5">
    <h2>Modifier le produit : {{ produit.nom }}</h2>
    
    <form action="{{ url_for('update_produit', id=produit.id) }}" method="POST">
        
        <div class="mb-3">
            <label for="nom" class="form-label">Nom du produit</label>
            <!-- value="{{ produit.nom }}" pré-remplit le champ -->
            <input type="text" class="form-control" id="nom" name="nom" value="{{ produit.nom }}" required>
        </div>

        <div class="mb-3">
            <label for="prix" class="form-label">Prix</label>
            <input type="number" step="0.01" class="form-control" id="prix" name="prix" value="{{ produit.prix }}" required>
        </div>

        <div class="mb-3">
            <label for="quantite" class="form-label">Quantité</label>
            <input type="number" class="form-control" id="quantite" name="quantite" value="{{ produit.quantite }}" required>
        </div>

        <div class="mb-3">
            <label for="categorie" class="form-label">Catégorie</label>
            <select class="form-control" id="categorie" name="categorie">
                <option value="Électronique" {% if produit.categorie == 'Électronique' %}selected{% endif %}>Électronique</option>
                <option value="Vêtements" {% if produit.categorie == 'Vêtements' %}selected{% endif %}>Vêtements</option>
                <option value="Alimentation" {% if produit.categorie == 'Alimentation' %}selected{% endif %}>Alimentation</option>
                <option value="Autre" {% if produit.categorie == 'Autre' %}selected{% endif %}>Autre</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
