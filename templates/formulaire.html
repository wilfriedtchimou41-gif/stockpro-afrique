{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">➕ Ajouter une Marchandise</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nom du produit</label>
                            <input type="text" name="nom" class="form-control" required placeholder="Ex: Ordinateur Portable">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Référence</label>
                            <input type="text" name="reference" class="form-control" required placeholder="Ex: REF-001">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Prix (FCFA)</label>
                            <input type="number" step="0.01" name="prix" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Quantité</label>
                            <input type="number" name="quantite" class="form-control" required value="0">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Catégorie</label>
                        <select name="categorie" class="form-select">
                            <option value="Électronique">Électronique</option>
                            <option value="Vêtements">Vêtements</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">URL de l'image</label>
                        <input type="url" name="image_url" class="form-control" placeholder="https://exemple.com/image.jpg" required>
                        <div class="form-text">Collez un lien d'image (clic droit sur une image Google > Copier l'adresse de l'image).</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-outline-secondary btn-lg">
                            <i class="bi bi-check-circle"></i> Enregistrer
                        </button>
                        <a href="/" class="btn btn-outline-secondary btn-lg">
                            <i class="bi bi-x-circle"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
